name: Android APK Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Analyze
        working-directory: flutter_app
        run: flutter analyze

      - name: Test
        working-directory: flutter_app
        run: flutter test

      - name: Build release APK
        working-directory: flutter_app
        run: flutter build apk --release --build-name=${GITHUB_REF_NAME#v} --build-number=${GITHUB_RUN_NUMBER}

      - name: Rename APK
        run: cp flutter_app/build/app/outputs/flutter-apk/app-release.apk obscure-app-${GITHUB_REF_NAME}.apk

      - name: Attach APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: obscure-app-${{ github.ref_name }}.apk
          generate_release_notes: true
