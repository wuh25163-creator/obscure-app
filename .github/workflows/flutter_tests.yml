                font-family: 'Space Grotesk', sans-serif;
                font-size: 10px;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.05em;
                color: rgba(26,26,26,0.6);
                margin-top: 4px;
                margin-bottom: 24px;
              }

              /* Field label */
              .field-label {
                font-family: 'Space Grotesk', sans-serif;
                font-size: 10px;
                font-weight: 900;
                text-transform: uppercase;
                letter-spacing: 0;
                color: var(--primary);
                margin-bottom: 4px;
              }

              /* TextField replica */
              .field-wrap {
                position: relative;
                margin-bottom: 16px;
              }
              .field-input {
                width: 100%;
                font-family: 'Space Grotesk', sans-serif;
                font-weight: 700;
                font-size: 15px;
                color: var(--primary);
                background: var(--surface);
                border: 2px solid var(--primary);
                border-radius: 0;
                padding: 14px 44px 14px 12px;
                outline: none;
                -webkit-appearance: none;
                appearance: none;
              }
              .field-input::placeholder {
                color: rgba(26,26,26,0.3);
                font-weight: 700;
              }
              .field-input:focus {
                border-color: var(--red);
              }
              .field-icon {
                position: absolute;
                right: 12px;
                top: 50%;
                transform: translateY(-50%);
                color: var(--red);
                font-size: 20px;
                pointer-events: none;
                font-style: normal;
              }
              .field-icon-at {
                position: absolute;
                right: 10px;
                top: 50%;
                transform: translateY(-50%);
                font-family: 'Space Grotesk', sans-serif;
                font-size: 22px;
                font-weight: 900;
                color: var(--red);
                pointer-events: none;
                line-height: 1;
