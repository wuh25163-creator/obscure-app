              }
              .signup-text {
                font-family: 'Space Grotesk', sans-serif;
                font-size: 14px;
                font-weight: 700;
                color: var(--primary);
                letter-spacing: 0;
              }
              .signup-text a { color: var(--blue); text-decoration: none; }

              /* ── Verification strip (red bottom bar) ── */
              .verify-strip {
                background: var(--red);
                border: 3px solid var(--primary);
                box-shadow: 4px 4px 0 var(--primary);
                padding: 16px;
                display: flex;
                align-items: center;
                gap: 16px;
              }
              .verify-icon-box {
                background: white;
                padding: 8px;
                display: flex;
                align-items: center;
                justify-content: center;
                flex-shrink: 0;
              }
              .verify-icon-box svg {
                width: 24px;
                height: 24px;
                fill: none;
                stroke: var(--primary);
                stroke-width: 1.8;
              }
              .verify-text {
                font-family: 'Space Grotesk', sans-serif;
                font-size: 14px;
                font-weight: 700;
                color: white;
                line-height: 1.3;
                letter-spacing: 0.03em;
              }

              /* ── Responsive: cap width on large screens ── */
              @media (min-width: 600px) {
                .dl-banner { justify-content: center; gap: 24px; }
              }
            </style>
          </head>
          <body>

            <!-- AppBar -->
            <header class="appbar">
              <div class="appbar-logo">
