              .neo-wrap:active .neo-btn {
                transform: translate(4px, 4px);
              }

              /* ── Page body ── */
              .page-body {
                padding: 48px 24px;
                display: flex;
                flex-direction: column;
                align-items: stretch;
                max-width: 480px;
                margin: 0 auto;
              }

              /* ── Login Card (exact replica of LoginVerificationScreen card) ── */
              .login-card {
                width: 100%;
                background: var(--surface);
                border: 3px solid var(--primary);
                box-shadow: 8px 8px 0 var(--primary);
                padding: 32px;
                margin-bottom: 32px;
