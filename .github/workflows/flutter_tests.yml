              .appbar-title-wrap {
                border-top: 2px solid var(--primary);
                padding-top: 2px;
              }
              .appbar-title {
                font-family: 'Space Grotesk', sans-serif;
                font-weight: 600;
                font-size: 20px;
                color: var(--primary);
                letter-spacing: 0;
              }

              /* ── Download Banner (pinned below AppBar) ── */
              .dl-banner {
                background: var(--yellow);
                border-bottom: 3px solid var(--primary);
                box-shadow: 0 4px 0 var(--primary);
                padding: 12px 24px;
