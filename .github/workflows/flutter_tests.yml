            </main>

            <script>
              // Replace placeholders with actual values injected by shell
              document.querySelectorAll('a[href="APK_URL_PLACEHOLDER"]').forEach(el => {
                el.href = "APKURL";
              });
              document.querySelectorAll('.dl-banner-text span').forEach(el => {
                el.textContent = "Android APK · TAGVAL";
              });
            </script>
          </body>
          </html>
          HTMLEOF

          # Inject shell variables into the HTML (safe substitution after heredoc)
          sed -i "s|APK_URL_PLACEHOLDER|${APK_URL}|g" gh-pages/index.html
          sed -i "s|APKURL|${APK_URL}|g" gh-pages/index.html
          sed -i "s|TAGVAL|${TAG}|g" gh-pages/index.html
          sed -i "s|APKDL_TAG_PLACEHOLDER|${TAG}|g" gh-pages/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages/

  # ─────────────────────────────────────────────
  # Job 3: 部署到 GitHub Pages（在 build-and-release 之後）
  # ─────────────────────────────────────────────
  deploy-pages:
    name: Deploy Download Page to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-and-release
    if: startsWith(github.ref, 'refs/tags/v')

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
