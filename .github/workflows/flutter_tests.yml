                  </div>
                  <div class="social-box">
                    <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" stroke-width="1.5"/></svg>
                  </div>
                </div>

                <!-- Divider -->
                <div class="divider">
                  <div class="divider-line"></div>
                  <div class="divider-text">或使用電子郵件 OR EMAIL</div>
