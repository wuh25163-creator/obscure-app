                height: 48px;
                display: flex;
                align-items: center;
                justify-content: center;
                background: var(--red);
                border: 3px solid var(--primary);
                font-family: 'Space Grotesk', sans-serif;
                font-size: 16px;
                font-weight: 900;
                color: white;
                cursor: pointer;
                letter-spacing: 0;
                transition: transform 70ms ease-out;
                -webkit-appearance: none;
              }
              .send-otp-wrap:active .send-otp-btn {
                transform: translate(4px, 4px);
              }

              /* Social login row */
              .social-row {
                display: flex;
                gap: 12px;
                justify-content: space-between;
                margin-bottom: 24px;
              }
              .social-box {
                flex: 1;
                aspect-ratio: 1;
                border: 2px solid var(--primary);
                background: var(--surface);
                display: flex;
                align-items: center;
                justify-content: center;
                font-family: 'Space Grotesk', sans-serif;
                font-size: 22px;
                font-weight: 900;
                color: var(--primary);
