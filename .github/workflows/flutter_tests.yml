name: Flutter CI / CD

on:
  push:
    branches:
      - '**'       # 所有分支 push → 跑測試
    tags:
      - 'v*'       # push tag v1.0.0 之類 → build APK + 發布 Release

# GitHub Pages 部署需要這些權限
permissions:
  contents: write        # 建立 Release / 上傳 asset
  pages: write           # 部署 GitHub Pages
  id-token: write        # Pages OIDC 驗證

jobs:
  # ─────────────────────────────────────────────
  # Job 1: 測試（每次 push 都跑）
  # ─────────────────────────────────────────────
  test:
    name: Run Tests and Generate Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        working-directory: ./flutter_app
        run: flutter pub get

      - name: Run tests with coverage
        working-directory: ./flutter_app
        run: flutter test --coverage

      - name: Install lcov
        run: |
          sudo apt-get update
          sudo apt-get install -y lcov

      - name: Generate HTML coverage report
        working-directory: ./flutter_app
        run: genhtml coverage/lcov.info -o coverage/html

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-coverage-report
          path: flutter_app/coverage/html/

  # ─────────────────────────────────────────────
  # Job 2: Build APK + Release（只在 tag v* 時跑）
  # ─────────────────────────────────────────────
  build-and-release:
    name: Build APK & Publish Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17 (Android build 需要)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        working-directory: ./flutter_app
        run: flutter pub get

      - name: Build release APK
        working-directory: ./flutter_app
        run: flutter build apk --release --build-name=${{ github.ref_name }} --build-number=${{ github.run_number }}

      - name: Rename APK（加入版本號）
        run: |
          mv flutter_app/build/app/outputs/flutter-apk/app-release.apk \
             flutter_app/build/app/outputs/flutter-apk/obscure-app-${{ github.ref_name }}.apk

      # ── 上傳到 GitHub Release ──
      - name: Create GitHub Release & upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "OBSCURE App ${{ github.ref_name }}"
          body: |
            ## 📱 OBSCURE App ${{ github.ref_name }}

            > **Android APK 直接下載安裝版**

            ### 安裝步驟
            1. 點擊下方 `obscure-app-${{ github.ref_name }}.apk` 下載
            2. 手機開啟「設定 → 安全性 → 允許安裝未知來源應用程式」
            3. 點開下載的 APK 檔案安裝即可

            ### 版本資訊
            - Build Number: `${{ github.run_number }}`
            - Commit: `${{ github.sha }}`
          files: flutter_app/build/app/outputs/flutter-apk/obscure-app-${{ github.ref_name }}.apk
          draft: false
          prerelease: false

      # ── 產生美觀的下載頁面（HTML）──
      - name: Generate download page (GitHub Pages)
        run: |
          mkdir -p gh-pages
          REPO="${{ github.repository }}"
          TAG="${{ github.ref_name }}"
          APK_URL="https://github.com/${REPO}/releases/download/${TAG}/obscure-app-${TAG}.apk"

          cat > gh-pages/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="zh-TW">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
            <title>OBSCURE — 下載</title>
            <link rel="preconnect" href="https://fonts.googleapis.com">
            <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
            <style>
              *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

              /* ── Design Tokens (exact match to AppTheme) ── */
              :root {
                --bg:        #F5F0E8;   /* AppTheme.background */
                --primary:   #1A1A1A;   /* AppTheme.primary */
                --surface:   #FFFFFF;   /* AppTheme.surface */
                --yellow:    #FFCC00;   /* AppTheme.accentYellow */
                --red:       #E63B2E;   /* AppTheme.accentRed */
                --blue:      #0055FF;   /* AppTheme.accentBlue */
                --green:     #00C853;
              }

              html { scroll-behavior: smooth; }

              body {
                font-family: 'Space Grotesk', sans-serif;
                background: var(--bg);
