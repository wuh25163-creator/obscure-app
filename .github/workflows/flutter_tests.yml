                stroke-width: 1.5;
              }

              /* Divider */
              .divider {
                display: flex;
                align-items: center;
                gap: 12px;
                margin-bottom: 24px;
              }
              .divider-line {
                flex: 1;
                height: 2px;
                background: var(--primary);
              }
              .divider-text {
                font-family: 'Space Grotesk', sans-serif;
                font-size: 10px;
                font-weight: 900;
                white-space: nowrap;
                color: var(--primary);
              }

              /* Password strength meter */
              .strength-row {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 4px;
              }
              .strength-label {
                font-family: 'Space Grotesk', sans-serif;
                font-size: 12px;
                font-weight: 700;
                color: var(--primary);
                letter-spacing: 0;
              }
              .strength-value {
                font-family: 'Space Grotesk', sans-serif;
                font-size: 12px;
                font-weight: 700;
                color: var(--red);
                letter-spacing: 0;
              }
              .strength-bars {
                display: flex;
                gap: 8px;
                margin-bottom: 48px;
              }
              .strength-bar {
                flex: 1;
                height: 8px;
                border: 1px solid var(--primary);
              }
              .strength-bar.filled { background: var(--red); }
              .strength-bar.empty  { background: rgba(26,26,26,0.08); }

              /* NeoButton: login (dark, large) */
              .login-btn-wrap {
                position: relative;
                margin-bottom: 48px;
              }
              .login-btn-shadow {
                position: absolute;
                inset: 0;
                transform: translate(8px, 8px);
                background: var(--red);
                border: 3px solid var(--primary);
              }
              .login-btn {
                position: relative;
                width: 100%;
                height: 64px;
                display: flex;
                align-items: center;
                justify-content: center;
                background: var(--primary);
                border: 3px solid var(--primary);
                font-family: 'Space Grotesk', sans-serif;
                font-size: 20px;
                font-weight: 900;
                color: white;
                cursor: pointer;
                transition: transform 70ms ease-out;
                -webkit-appearance: none;
              }
              .login-btn-wrap:active .login-btn {
                transform: translate(8px, 8px);
              }

              /* Footer links */
              .forgot-link {
                font-family: 'Space Grotesk', sans-serif;
                font-size: 14px;
