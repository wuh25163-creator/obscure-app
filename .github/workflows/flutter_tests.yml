                <!-- Strength meter -->
                <div class="strength-row">
                  <span class="strength-label">安全性強度</span>
                  <span class="strength-value">弱</span>
                </div>
                <div class="strength-bars">
                  <div class="strength-bar filled"></div>
                  <div class="strength-bar empty"></div>
                  <div class="strength-bar empty"></div>
                  <div class="strength-bar empty"></div>
                </div>

                <!-- Login button -->
                <div class="login-btn-wrap">
                  <div class="login-btn-shadow"></div>
                  <button class="login-btn" disabled>登入</button>
                </div>

                <span class="forgot-link">忘記存取密鑰？</span>
                <div class="divider-mini"></div>
                <div class="signup-text">新用戶？ <a href="#">申請存取權限</a></div>
              </div>

              <!-- Verification strip -->
              <div class="verify-strip">
                <div class="verify-icon-box">
                  <svg viewBox="0 0 24 24">
                    <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" stroke-width="1.8"/>
