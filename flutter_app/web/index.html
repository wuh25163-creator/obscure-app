<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="obscure_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>obscure_app</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script>
    (function () {
      const isLocalPreview =
        window.location.hostname === '127.0.0.1' ||
        window.location.hostname === 'localhost';

      const loadFlutter = function () {
        const script = document.createElement('script');
        script.src = isLocalPreview
          ? 'flutter_bootstrap.js?v=' + Date.now()
          : 'flutter_bootstrap.js';
        script.async = true;
        document.body.appendChild(script);
      };

      if (!isLocalPreview) {
        loadFlutter();
        return;
      }

      const clearServiceWorkers =
        'serviceWorker' in navigator
          ? navigator.serviceWorker
              .getRegistrations()
              .then((registrations) =>
                Promise.all(
                  registrations.map((registration) => registration.unregister()),
                ),
              )
          : Promise.resolve();

      const clearCaches =
        'caches' in window
          ? caches
              .keys()
              .then((keys) => Promise.all(keys.map((key) => caches.delete(key))))
          : Promise.resolve();

      Promise.all([clearServiceWorkers, clearCaches]).finally(loadFlutter);
    })();
  </script>
</body>
</html>
